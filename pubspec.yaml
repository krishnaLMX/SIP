name: startgold
description: "A secure Fintech project."
publish_to: 'none'
version: 1.0.0+3

environment:
  sdk: '>=3.4.1 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.6
  intl: 0.20.2

  # Core Logic & Network
  dio: ^5.4.1
  flutter_riverpod: ^2.4.9
  shared_preferences: ^2.5.2
  package_info_plus: ^9.0.0
  connectivity_plus: ^7.0.0
  web_socket_channel: ^3.0.3

  # Security & Identity
  flutter_secure_storage: ^9.0.0
  root_checker_plus: ^0.0.3
  device_info_plus: ^10.1.0
  screen_protector: ^1.5.1
  local_auth: ^3.0.1
  crypto: ^3.0.3
  encrypt: ^5.0.3

  # UI & Design
  flutter_screenutil: ^5.8.4
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.9
  carousel_slider: ^5.0.0
  pinput: ^5.0.0
  shimmer: ^3.0.0
  confetti: ^0.8.0
  lottie: ^3.3.1

  # Media & Files
  image_picker: ^1.2.1
  image_cropper: ^11.0.0
  path_provider: ^2.1.5
  path: ^1.9.1
  url_launcher: ^6.3.2
  share_plus: ^10.0.3

  # Payment
  flutter_cashfree_pg_sdk: ^2.2.10+48

  # Splash Screen (must be in dependencies for native integration)
  flutter_native_splash: ^2.4.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  # Build-time tools (not bundled into the app)
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/images/
    - assets/fonts/
    - assets/sidemenu/
    - assets/resources/
    - assets/withdraw/
    - assets/footer/
    - assets/home/
    - assets/lottie/

  fonts:
    - family: Lora
      fonts:
        - asset: assets/fonts/Lora-Regular.ttf
        - asset: assets/fonts/Lora-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Lora-Bold.ttf
          weight: 700

flutter_native_splash:
  color: "#FEF7E6"
  fullscreen: true
  android_12:
    color: "#FEF7E6"

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/resources/icon.png"
  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: "assets/resources/icon.png"
  adaptive_icon_foreground_inset: 3
